<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<title>俯卧撑打卡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1a1a1a,#2a2a2a);color:#e0e0e0;padding:16px;padding-bottom:100px;max-width:480px;margin:0 auto;min-height:100vh}

/* 金属质感组件 */
.metal-box{background:linear-gradient(145deg,#3a3a3a,#2a2a2a,#4a4a4a);border-radius:12px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 2px 12px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.15),inset 0 -1px 0 rgba(0,0,0,0.3)}
.metal-btn{background:linear-gradient(180deg,#5a5a5a,#3a3a3a);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#e8e8e8;font-weight:600;cursor:pointer;text-shadow:0 1px 2px rgba(0,0,0,0.5);box-shadow:0 2px 6px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.2);transition:all 0.1s}
.metal-btn:active{background:linear-gradient(180deg,#3a3a3a,#2a2a2a);box-shadow:inset 0 2px 4px rgba(0,0,0,0.4)}
.metal-input{background:linear-gradient(145deg,#2a2a2a,#1a1a1a);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#e0e0e0;outline:none;box-shadow:inset 0 2px 6px rgba(0,0,0,0.4)}
.metal-input:focus{border-color:rgba(255,200,100,0.4);box-shadow:inset 0 2px 6px rgba(0,0,0,0.4),0 0 8px rgba(255,200,100,0.15)}
.metal-select{background:linear-gradient(145deg,#3a3a3a,#2a2a2a);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e0e0e0;outline:none;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3)}

.header{text-align:center;padding:18px;margin-bottom:16px}
.header .label{font-size:12px;color:#999;letter-spacing:2px;text-transform:uppercase}
.header .count{font-size:48px;font-weight:800;color:#ffd700;text-shadow:0 2px 12px rgba(255,215,0,0.3);margin-top:4px}
.header .goal-text{font-size:12px;color:#777;margin-top:4px}

.input-row{display:flex;gap:10px;margin-bottom:12px}
.input-row input{flex:1;padding:14px 16px;font-size:20px;text-align:center}
.input-row button{padding:14px 24px;font-size:16px;white-space:nowrap}
.quick-add{display:flex;gap:6px;margin-bottom:16px}
.quick-add button{flex:1;padding:10px;font-size:14px}

.stats{display:flex;gap:8px;margin-bottom:16px}
.stat-card{flex:1;padding:14px;text-align:center}
.stat-card .num{font-size:26px;font-weight:700;color:#ffd700;text-shadow:0 1px 6px rgba(255,215,0,0.2);line-height:1.3}
.stat-card .lbl{font-size:11px;color:#888;margin-top:2px;letter-spacing:1px}

.filter-bar{display:flex;gap:10px;margin-bottom:16px}
.filter-bar select{flex:1;padding:10px;font-size:14px}

.chart-section{margin-bottom:16px}
.chart-section h3{font-size:13px;color:#999;margin-bottom:8px;font-weight:600;letter-spacing:1px}
.chart-wrap{padding:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.chart{display:flex;align-items:flex-end;gap:3px;min-height:110px;padding-top:8px}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;min-width:24px}
.bar{width:100%;max-width:22px;background:linear-gradient(to top,#ffd700,#ffed4a);border-radius:2px 2px 0 0;min-height:1px;transition:height 0.3s;box-shadow:0 0 6px rgba(255,215,0,0.2)}
.bar-label{font-size:8px;color:#666;margin-top:3px;white-space:nowrap}
.bar-val{font-size:9px;color:#bbb;font-weight:600;margin-bottom:2px}

.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,#2a2a2a,#1a1a1a);border-top:1px solid rgba(255,255,255,0.1);padding:10px 16px;display:flex;gap:8px;max-width:480px;margin:0 auto;box-shadow:0 -4px 20px rgba(0,0,0,0.4)}
.bottom-bar button{flex:1;padding:10px;font-size:12px}
.bottom-bar button.active{background:linear-gradient(180deg,#5a5a5a,#4a4a4a);border-color:rgba(255,215,0,0.3);color:#ffd700;box-shadow:0 0 8px rgba(255,215,0,0.1)}

.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:100;justify-content:center;align-items:center}
.modal.show{display:flex}
.modal-box{padding:24px;width:88%;max-width:340px}
.modal-box h3{color:#ffd700;margin-bottom:16px;font-size:16px}
.modal-box input{width:100%;padding:12px;border-radius:8px;font-size:16px;text-align:center;margin-bottom:12px}
.modal-box .btns{display:flex;gap:10px}
.modal-box .btns button{flex:1;padding:12px;border-radius:8px;border:none;font-size:15px;font-weight:600;cursor:pointer}
.modal-box .btns .ok{background:linear-gradient(180deg,#ffd700,#e6b800);color:#1a1a1a;font-weight:700}
.modal-box .btns .cancel{background:linear-gradient(180deg,#4a4a4a,#3a3a3a);color:#999}
</style>
</head>
<body>

<div class="header metal-box">
  <div class="label">💪 今日完成</div>
  <div class="count" id="todayCount">0</div>
  <div class="goal-text" id="goalText">目标: 50个/天</div>
</div>

<div class="input-row">
  <input class="metal-input" type="number" id="inputNum" placeholder="个数" min="1" max="999">
  <button class="metal-btn" id="addBtn">+ 添加</button>
</div>

<div class="quick-add">
  <button class="metal-btn" data-n="10">+10</button>
  <button class="metal-btn" data-n="20">+20</button>
  <button class="metal-btn" data-n="30">+30</button>
  <button class="metal-btn" data-n="50">+50</button>
</div>

<div class="stats">
  <div class="stat-card metal-box"><div class="num" id="weekTotal">0</div><div class="lbl">本周</div></div>
  <div class="stat-card metal-box"><div class="num" id="monthTotal">0</div><div class="lbl">本月</div></div>
  <div class="stat-card metal-box"><div class="num" id="totalAll">0</div><div class="lbl">总计</div></div>
</div>

<div class="filter-bar">
  <select class="metal-select" id="monthSelect"></select>
  <select class="metal-select" id="yearSelect"></select>
</div>

<div class="chart-section">
  <h3>📊 每日</h3>
  <div class="chart-wrap metal-box">
    <div class="chart" id="monthChart"></div>
  </div>
</div>

<div class="chart-section">
  <h3>📊 每月</h3>
  <div class="chart-wrap metal-box">
    <div class="chart" id="yearChart"></div>
  </div>
</div>

<div class="bottom-bar">
  <button class="metal-btn" id="tabToday">📅 今日记录</button>
  <button class="metal-btn active" id="tabAll">📋 全部记录</button>
  <button class="metal-btn" id="setGoalBtn">🎯 目标</button>
</div>

<!-- 记录弹窗 -->
<div class="modal" id="recordModal">
  <div class="modal-box metal-box">
    <h3>📋 打卡记录</h3>
    <div id="recordList" style="max-height:300px;overflow-y:auto;margin-bottom:12px"></div>
    <div class="btns">
      <button class="ok" id="recordClose">关闭</button>
    </div>
  </div>
</div>

<div class="modal" id="goalModal">
  <div class="modal-box metal-box">
    <h3>🎯 每日目标</h3>
    <input class="metal-input" type="number" id="goalInput" placeholder="每日目标个数" min="1">
    <div class="btns">
      <button class="cancel" id="goalCancel">取消</button>
      <button class="ok" id="goalOk">确定</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY='pushup_data',GOAL_KEY='pushup_goal';
const today=()=>new Date().toISOString().slice(0,10);
function load(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch{return{}}}
function save(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}
function getGoal(){return parseInt(localStorage.getItem(GOAL_KEY))||50}
function setGoal(n){localStorage.setItem(GOAL_KEY,n)}
function pad2(n){return String(n).padStart(2,'0')}
function sumRange(data,s,e){let t=0;for(const[d,c]of Object.entries(data)){if(d>=s&&d<=e)t+=c}return t}

const ms=document.getElementById('monthSelect'),ys=document.getElementById('yearSelect')
const n=new Date()
for(let m=1;m<=12;m++){const o=document.createElement('option');o.value=m;o.textContent=m+'月';ms.appendChild(o)}
ms.value=n.getMonth()+1
for(let y=n.getFullYear();y>=2020;y--){const o=document.createElement('option');o.value=y;o.textContent=y+'年';ys.appendChild(o)}
ys.value=n.getFullYear()

function renderDaily(y,m){
  const data=load(),days=new Date(y,m,0).getDate()
  const vals=[]
  for(let d=1;d<=days;d++)vals.push(data[`${y}-${pad2(m)}-${pad2(d)}`]||0)
  const mx=Math.max(...vals,1)
  const c=document.getElementById('monthChart')
  c.innerHTML=vals.map((v,i)=>{
    const h=Math.max(1,(v/mx)*100)
    return `<div class="bar-group"><div class="bar-val">${v||''}</div><div class="bar" style="height:${h}px"></div><div class="bar-label">${i+1}日</div></div>`
  }).join('')
}

function renderMonthly(y){
  const data=load(),monthly=[]
  for(let m=1;m<=12;m++){
    let t=0;const days=new Date(y,m,0).getDate()
    for(let d=1;d<=days;d++){const v=data[`${y}-${pad2(m)}-${pad2(d)}`];if(v)t+=v}
    monthly.push(t)
  }
  const mx=Math.max(...monthly,1)
  const c=document.getElementById('yearChart'),lb=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月']
  c.innerHTML=monthly.map((v,i)=>{
    const h=Math.max(1,(v/mx)*100)
    return `<div class="bar-group"><div class="bar-val">${v||''}</div><div class="bar" style="height:${h}px"></div><div class="bar-label">${lb[i]}</div></div>`
  }).join('')
}

function renderAll(){
  const data=load(),td=today(),goal=getGoal()
  const tv=data[td]||0
  document.getElementById('todayCount').textContent=tv+(tv>=goal?' ✓':'')
  document.getElementById('goalText').textContent=`目标: ${goal}个/天`
  
  const wr={start:new Date((d=>{d.setDate(d.getDate()-((d.getDay()||7)-1));return d})(new Date)).toISOString().slice(0,10),end:td}
  document.getElementById('weekTotal').textContent=sumRange(data,`${td.slice(0,7)}-01`,td)
  document.getElementById('monthTotal').textContent=sumRange(data,`${td.slice(0,7)}-01`,td)
  document.getElementById('totalAll').textContent=Object.values(data).reduce((a,b)=>a+b,0)
  
  renderDaily(parseInt(ys.value),parseInt(ms.value))
  renderMonthly(parseInt(ys.value))
}

ms.onchange=()=>renderDaily(parseInt(ys.value),parseInt(ms.value))
ys.onchange=()=>{renderMonthly(parseInt(ys.value));renderDaily(parseInt(ys.value),parseInt(ms.value))}

document.getElementById('addBtn').onclick=()=>{
  const n=parseInt(document.getElementById('inputNum').value)
  if(!n||n<1)return
  const d=load(),td=today()
  d[td]=(d[td]||0)+n;save(d)
  document.getElementById('inputNum').value='';renderAll()
}
document.getElementById('inputNum').onkeydown=e=>{if(e.key==='Enter')document.getElementById('addBtn').click()}
document.querySelectorAll('.quick-add button').forEach(b=>{b.onclick=function(){
  const d=load(),td=today()
  d[td]=(d[td]||0)+parseInt(this.dataset.n);save(d);renderAll()
}})

// 记录弹窗
function showRecords(){
  const data=load()
  const entries=Object.entries(data).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,60)
  const list=document.getElementById('recordList')
  if(!entries.length){list.innerHTML='<div style="text-align:center;color:#666;padding:20px">暂无记录</div>'}
  else{
    list.innerHTML=entries.map(([date,count])=>{
      const d=new Date(date),wd=['日','一','二','三','四','五','六'][d.getDay()]
      const label=date===today()?'今天':`${date.slice(5)} 周${wd}`
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
        <span style="font-size:13px;color:#ccc">${label}</span>
        <span><span style="font-size:14px;font-weight:600;color:#ffd700;margin-right:12px">${count}个</span>
        <span class="del" data-date="${date}" style="color:#ff4444;font-size:14px;cursor:pointer;padding:2px 6px">✕</span></span>
      </div>`
    }).join('')
    document.querySelectorAll('.del').forEach(el=>{el.onclick=function(){
      const d=load();delete d[this.dataset.date];save(d);showRecords();renderAll()
    }})
  }
  document.getElementById('recordModal').classList.add('show')
}
document.getElementById('tabToday').onclick=showRecords
document.getElementById('tabAll').onclick=showRecords
document.getElementById('recordClose').onclick=()=>document.getElementById('recordModal').classList.remove('show')
document.getElementById('recordModal').onclick=function(e){if(e.target===this)this.classList.remove('show')}

document.getElementById('setGoalBtn').onclick=()=>{document.getElementById('goalInput').value=getGoal();document.getElementById('goalModal').classList.add('show')}
document.getElementById('goalCancel').onclick=()=>document.getElementById('goalModal').classList.remove('show')
document.getElementById('goalOk').onclick=()=>{const n=parseInt(document.getElementById('goalInput').value);if(n&&n>0){setGoal(n);document.getElementById('goalModal').classList.remove('show');renderAll()}}
document.getElementById('goalModal').onclick=function(e){if(e.target===this)this.classList.remove('show')}

renderAll()
</script>
</body>
</html>
